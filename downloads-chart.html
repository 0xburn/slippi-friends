// Compute daily aggregates
const dailyMap = {};
hourlyData.forEach(d => {
  const day = d.hour.slice(0, 10);
  dailyMap[day] = (dailyMap[day] || 0) + d.signups;
});
const dailyData = Object.entries(dailyMap).map(([day, signups]) => ({ day, signups }));

// Compute cumulative
let cumulative = 0;
const cumulativeData = hourlyData.map(d => {
  cumulative += d.signups;
  return { hour: d.hour, total: cumulative };
});

// Stats
const peakHour = hourlyData.reduce((a, b) => a.signups > b.signups ? a : b);
const peakDay = dailyData.reduce((a, b) => a.signups > b.signups ? a : b);
const firstDate = new Date(hourlyData[0].hour);
const lastDate = new Date(hourlyData[hourlyData.length - 1].hour);
const daysLive = Math.ceil((lastDate - firstDate) / (1000 * 60 * 60 * 24));

document.getElementById('peak-hour').textContent = peakHour.signups;
document.getElementById('peak-day').textContent = peakDay.signups;
document.getElementById('days-live').textContent = daysLive;

const gridColor = 'rgba(48, 54, 61, 0.6)';
const tickColor = '#8b949e';

// Signups chart
const signupsCtx = document.getElementById('signupsChart').getContext('2d');
let signupsChart;

function buildSignupsChart(mode) {
  if (signupsChart) signupsChart.destroy();

  const isHourly = mode === 'hourly';
  const data = isHourly
    ? hourlyData.map(d => ({ x: d.hour, y: d.signups }))
    : dailyData.map(d => ({ x: d.day + 'T12:00:00-04:00', y: d.signups }));

  signupsChart = new Chart(signupsCtx, {
    type: 'line',
    data: {
      datasets: [{
        label: isHourly ? 'Signups per hour' : 'Signups per day',
        data,
        borderColor: isHourly ? '#58a6ff' : '#a371f7',
        backgroundColor: isHourly
          ? 'rgba(88, 166, 255, 0.1)'
          : 'rgba(163, 113, 247, 0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHitRadius: 8,
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1c2128',
          titleColor: '#e6edf3',
          bodyColor: '#8b949e',
          borderColor: '#30363d',
          borderWidth: 1,
          padding: 12,
          callbacks: {
            title: (items) => {
              const d = new Date(items[0].parsed.x);
              const tz = { timeZone: 'America/New_York' };
              return isHourly
                ? d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', ...tz }) + ' ' +
                  d.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true, ...tz }) + ' EST'
                : d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric', ...tz });
            },
            label: (item) => `  ${item.parsed.y} signups`
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: {
            unit: isHourly ? 'day' : 'day',
            displayFormats: { day: 'MMM d', hour: 'MMM d ha' },
          },
          grid: { color: gridColor },
          ticks: { color: tickColor, maxRotation: 0 },
        },
        y: {
          beginAtZero: true,
          grid: { color: gridColor },
          ticks: { color: tickColor, stepSize: isHourly ? 5 : 50 },
          title: { display: true, text: 'Signups', color: tickColor }
        }
      }
    }
  });
}

buildSignupsChart('hourly');

function setView(mode) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  buildSignupsChart(mode);
}

// Cumulative chart
const cumCtx = document.getElementById('cumulativeChart').getContext('2d');
new Chart(cumCtx, {
  type: 'line',
  data: {
    datasets: [{
      label: 'Cumulative signups',
      data: cumulativeData.map(d => ({ x: d.hour, y: d.total })),
      borderColor: '#a371f7',
      backgroundColor: 'rgba(163, 113, 247, 0.1)',
      fill: true,
      tension: 0.3,
      pointRadius: 0,
      pointHitRadius: 8,
      borderWidth: 2.5,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1c2128',
        titleColor: '#e6edf3',
        bodyColor: '#8b949e',
        borderColor: '#30363d',
        borderWidth: 1,
        padding: 12,
        callbacks: {
          title: (items) => {
            const d = new Date(items[0].parsed.x);
            const tz = { timeZone: 'America/New_York' };
            return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', ...tz }) + ' ' +
              d.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true, ...tz }) + ' EST';
          },
          label: (item) => `  ${item.parsed.y.toLocaleString()} total signups`
        }
      }
    },
    scales: {
      x: {
        type: 'time',
        time: { unit: 'day', displayFormats: { day: 'MMM d' } },
        grid: { color: gridColor },
        ticks: { color: tickColor, maxRotation: 0 },
      },
      y: {
        beginAtZero: true,
        grid: { color: gridColor },
        ticks: { color: tickColor },
        title: { display: true, text: 'Total Signups', color: tickColor }
      }
    }
  }
});
</script>
